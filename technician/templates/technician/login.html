{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technician Login — Wolf Backflow</title>
  <link rel="stylesheet" href="{% static 'css/tech.css' %}">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <img src="{% static 'images/logo.svg' %}" alt="Wolf Backflow" class="login-logo">
    <div class="login-portal-tag">Wolf Backflow Portal</div>

    <h2>Sign In</h2>
    <p>Enter your credentials to access your account.</p>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'tech_login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:12px; color:#8A9BAC;">
      <a href="/" style="color:#00A8A8;">← Back to public site</a>
    </p>
  </div>
</div>

</body>
</html>
