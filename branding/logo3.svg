<svg width="420" height="152" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 152">
  <rect width="420" height="152" fill="white"/>

  <!-- WOLF clean sans-serif -->
  <text x="210" y="88"
        font-family="Arial, Helvetica, sans-serif"
        font-size="74"
        font-weight="bold"
        fill="#1B3A5C"
        text-anchor="middle"
        letter-spacing="14">WOLF</text>

  <!-- Simple reverse arc: right to left = backflow -->
  <path d="M 340,110 C 270,134 150,134 70,110"
        stroke="#00A8A8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Arrowhead pointing left -->
  <line x1="70" y1="110" x2="84" y2="102" stroke="#00A8A8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="110" x2="80" y2="120" stroke="#00A8A8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="210" y="141"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5"
        fill="#1B3A5C"
        text-anchor="middle"
        letter-spacing="4.5"
        opacity="0.55">BACKFLOW TESTING SERVICES</text>
</svg>
